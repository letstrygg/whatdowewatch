<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>What Do We Watch</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <h1>What Do We Watch</h1>
    <p>Open your browser's Developer Tools (F12) and check the Console.</p>

    <script>
        // 2. Initialize Supabase (USE YOUR PUBLIC ANON KEY!)
        const supabaseUrl = 'https://fnwmtytnltmqjaflfwyr.supabase.co';
        const supabaseAnonKey = 'sb_publishable_y12qZF_dSbUPmV_aieiUgA_CibDsxQV';
        
        // Changed variable name to supabaseClient to avoid collision
        const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseAnonKey);

        // 3. Fetch the data
        async function fetchShows() {
            console.log("Connecting to Supabase...");

            // Use the new variable name here too
            const { data, error } = await supabaseClient
                .from('items')
                .select('*')
                .eq('media_type', 'show'); 

            if (error) {
                console.error("Database Error:", error.message);
                return;
            }

            console.log(`Success! Found ${data.length} show(s):`);
            console.log(data);
        }

        fetchShows();
    </script>
</body>
</html>
