<body>
    <h1>What Do We Watch</h1>
    <div id="shows-container">Loading...</div>

    <script src="js/config.js"></script>

    <script>
        // 2. Reference the variables from the loaded CONFIG object
        const supabaseUrl = CONFIG.SUPABASE_URL;
        const supabaseAnonKey = CONFIG.SUPABASE_ANON_KEY;
        const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseAnonKey);

        async function fetchShows() {
            const { data, error } = await supabaseClient
                .from('items')
                .select('*')
                .eq('media_type', 'show'); 

            const container = document.getElementById('shows-container');

            if (error) {
                container.innerHTML = `<p style="color: red;">Error: ${error.message}</p>`;
                return;
            }

            if (data.length === 0) {
                container.innerHTML = "<p>No shows found in the database.</p>";
                return;
            }

            // Clear the "Loading..." text
            container.innerHTML = '';

            // Loop through the array and build the HTML
            data.forEach(show => {
                const showElement = document.createElement('div');
                showElement.innerHTML = `
                    <h2>${show.title} (${show.release_date.split('-')[0]})</h2>
                    <p><strong>Status:</strong> ${show.release_status}</p>
                    <p>${show.description}</p>
                    <hr>
                `;
                container.appendChild(showElement);
            });
        }

        fetchShows();
    </script>
</body>
